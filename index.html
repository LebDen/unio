<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="./favicon.png" sizes="32x32" type="image/png">
    <link rel="icon" href="./favicon.png" sizes="512x512" type="image/png">
    <link rel="apple-touch-icon" href="./favicon.png">
    <meta name="theme-color" content="#030303">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="UNIO — тестирование спроса на мужскую одежду.">
    <title>UNIO | LEBDEN GROUP</title>
    
    <!-- Шрифты -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=space-grotesk@300,400,500,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030303;
            --card-bg: #0a0a0a;
            --border: #222;
            --text: #fff;
            --muted: #555;
            --accent: #ff3d00;
            --font-head: 'Clash Display', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { background: var(--bg); color: var(--text); font-family: var(--font-body); scroll-behavior: smooth; }
        body { min-height: 100vh; overflow-x: hidden; }

        /* Noise texture */
        body::before {
            content: ''; position: fixed; inset: -50%; width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.06; pointer-events: none; z-index: 0; animation: grain 0.5s steps(1) infinite;
        }
        @keyframes grain { 0%,100%{transform:translate(0,0)} 10%{transform:translate(-5%,-10%)} 30%{transform:translate(3%,-15%)} 50%{transform:translate(12%,9%)} 70%{transform:translate(9%,4%)} 90%{transform:translate(-1%,7%)} }

        /* ===== INTRO ===== */
        #intro { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: grid; place-items: center; transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1); }
        #intro.up { transform: translateY(-100%); }
        .intro-logo { font-family: var(--font-head); font-size: clamp(4rem, 18vw, 14rem); font-weight: 700; letter-spacing: -0.05em; opacity: 0; animation: popIn 1s ease 0.4s forwards; }
        .intro-sub { position: absolute; bottom: 12vh; font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); opacity: 0; animation: fadeUp 0.8s ease 1.2s forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.7) translateY(40px) } 60% { opacity: 1; transform: scale(1.05) translateY(-5px) } 100% { opacity: 1; transform: scale(1) translateY(0) } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(-10px); } }

        /* ===== HEADER ===== */
        header { position: fixed; top: 0; left: 0; width: 100%; z-index: 90; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid transparent; background: rgba(3,3,3,0.7); backdrop-filter: blur(12px); transition: border-color 0.3s, background 0.3s; }
        header.scrolled { border-bottom-color: var(--border); background: rgba(3,3,3,0.95); }
        .logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; }
        .logo span { font-size: 0.65em; color: var(--muted); border: 1px solid var(--muted); padding: 2px 8px; margin-left: 6px; }
        .btn-share { font-family: var(--font-body); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 20px; border: 1px solid var(--border); color: var(--muted); transition: all 0.3s; cursor: pointer; }
        .btn-share:hover { color: var(--text); border-color: var(--text); background: var(--text); color: var(--bg); }

        /* ===== HERO ===== */
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 100px 20px 60px; text-align: center; position: relative; z-index: 1; }
        .hero::after { content: ''; position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 80vw; height: 80vw; max-width: 600px; max-height: 600px; background: radial-gradient(circle, rgba(255,61,0,0.06) 0%, transparent 70%); pointer-events: none; z-index: -1; animation: pulseGlow 4s ease-in-out infinite; }
        @keyframes pulseGlow { 0%,100% { opacity: 0.5; transform: translateX(-50%) scale(1) } 50% { opacity: 1; transform: translateX(-50%) scale(1.1) } }
        h1 { font-family: var(--font-head); font-size: clamp(3.5rem, 11vw, 10rem); line-height: 0.88; letter-spacing: -0.04em; text-transform: uppercase; margin-bottom: 24px; }
        h1 em { font-style: italic; font-weight: 300; color: var(--muted); }
        
        /* ===== MARQUEE ===== */
        .marquee { width: 100%; overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 14px 0; background: var(--bg); position: relative; z-index: 2; }
        .marquee-track { display: flex; animation: scroll 25s linear infinite; width: max-content; }
        .marquee-track span { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); white-space: nowrap; padding: 0 40px; }
        @keyframes scroll { 0% { transform: translateX(0) } 100% { transform: translateX(-50%) } }

        /* ===== CATALOG ===== */
        .catalog { padding: 80px 20px 100px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }
        .catalog-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-wrap: wrap; gap: 20px; }
        .sec-title { font-family: var(--font-head); font-size: clamp(2rem, 5vw, 3.5rem); text-transform: uppercase; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip { font-family: var(--font-body); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 18px; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.3s; cursor: pointer; }
        .chip:hover { color: var(--text); border-color: var(--text); }
        .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px 24px; }

        /* CARD */
        .card { position: relative; perspective: 1000px; cursor: pointer; }
        .card-inner { transition: transform 0.15s ease-out; transform-style: preserve-3d; }
        .card-img-wrap { aspect-ratio: 3/4; background: #0d0d0d; overflow: hidden; position: relative; border: 1px solid var(--border); border-radius: 16px; transition: all 0.4s; }
        .card:hover .card-img-wrap { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 30px rgba(255,61,0,0.1); }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) brightness(0.85); transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .card:hover .card-img-wrap img { filter: grayscale(0%) brightness(1); transform: scale(1.06); }
        
        /* Overlay hint */
        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.7));
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .card:hover .card-overlay { opacity: 1; }
        .card-hint {
            background: var(--accent); color: #000; padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
        }
        
        .card-info { padding: 18px 0 0; display: flex; justify-content: space-between; align-items: baseline; }
        .card-title { font-family: var(--font-head); font-size: 1.3rem; text-transform: uppercase; font-weight: 600; }
        .card-price { font-size: 0.95rem; color: var(--muted); }
        .card-cat { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            display: grid; place-items: center; padding: 20px;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; max-width: 800px; width: 100%;
            overflow: hidden; position: relative;
            transform: translateY(30px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .modal-overlay.active .modal { transform: translateY(0); }

        .modal-content { display: grid; grid-template-columns: 1fr 1fr; }
        
        /* 🆕 Галерея */
        .modal-media { position: relative; aspect-ratio: 3/4; background: #0d0d0d; }
        .modal-media img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.25s ease; }
        .modal-media img.fade { opacity: 0; }

        .gallery-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.6); border: 1px solid var(--border);
            color: var(--text); font-size: 1.2rem; cursor: pointer;
            display: grid; place-items: center; transition: all 0.2s;
            z-index: 5; backdrop-filter: blur(4px);
            user-select: none;
        }
        .gallery-nav:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
        .gallery-nav.prev { left: 12px; }
        .gallery-nav.next { right: 12px; }

        .gallery-counter {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.7); color: var(--muted);
            padding: 4px 10px; border-radius: 6px;
            font-size: 0.7rem; font-family: var(--font-body);
            z-index: 5; pointer-events: none;
        }

        .gallery-thumbs {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; gap: 8px; padding: 12px;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.85));
            overflow-x: auto; scrollbar-width: none;
            z-index: 5;
        }
        .gallery-thumbs::-webkit-scrollbar { display: none; }

        .gallery-thumbs img {
            width: 60px; height: 60px; object-fit: cover;
            border-radius: 8px; border: 2px solid transparent;
            cursor: pointer; transition: all 0.2s;
            opacity: 0.55; flex-shrink: 0;
        }
        .gallery-thumbs img:hover { opacity: 1; transform: scale(1.05); }
        .gallery-thumbs img.active {
            border-color: var(--accent); opacity: 1;
            box-shadow: 0 0 0 2px rgba(255,61,0,0.35);
        }

        .modal-media.single .gallery-nav,
        .modal-media.single .gallery-counter,
        .modal-media.single .gallery-thumbs { display: none; }

        .modal-badge {
            position: absolute; top: 16px; left: 16px;
            background: var(--accent); color: #000;
            padding: 6px 12px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            display: none;
        }

        .modal-info { padding: 32px; display: flex; flex-direction: column; gap: 16px; }
        .modal-title { font-family: var(--font-head); font-size: clamp(1.4rem, 3vw, 1.8rem); font-weight: 700; line-height: 1.1; }
        .modal-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .modal-price { font-size: 1.25rem; font-weight: 600; }
        .modal-cat { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; }
        .modal-desc { color: var(--muted); line-height: 1.5; font-size: 0.9rem; }

        .modal-section { margin-top: 4px; }
        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; display: block; }
        .size-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .size-btn {
            width: 44px; height: 44px; border-radius: 10px;
            background: transparent; border: 1px solid var(--border);
            color: var(--text); font-family: var(--font-body); font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .size-btn:hover { border-color: var(--text); }
        .size-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        .btn-primary {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--accent); color: #000; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.03em;
            margin-top: 8px;
        }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary.disabled { background: var(--border); color: var(--muted); cursor: default; transform: none; }

        .modal-hint { font-size: 0.7rem; color: var(--muted); text-align: center; margin-top: 4px; }
        .modal-close {
            position: absolute; top: 16px; right: 16px; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            display: grid; place-items: center; cursor: pointer; color: var(--text);
            transition: all 0.2s; backdrop-filter: blur(4px);
        }
        .modal-close:hover { background: var(--text); color: var(--bg); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 50px; font-size: 0.9rem;
            opacity: 0; transition: all 0.3s; z-index: 300; pointer-events: none;
        }
        .toast.show { opacity: 1; bottom: 40px; }

        /* ===== RESPONSIVE ===== */
        @media(max-width: 768px) {
            header { padding: 16px 20px; }
            .catalog { padding: 50px 16px 80px; }
            .sec-title { font-size: 1.8rem; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .card-img-wrap { border-radius: 12px; }
            .modal-content { grid-template-columns: 1fr; }
            .modal-media { aspect-ratio: 4/3; }
            .modal-info { padding: 24px 20px; }
            .gallery-nav { width: 36px; height: 36px; font-size: 1rem; }
            .gallery-thumbs img { width: 50px; height: 50px; }
        }
        @media(max-width: 480px) {
            .grid { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
        }
    </style>
</head>

            <div class="modal-section">

              <div class="size-grid" id="size-grid">
                <button class="size-btn" data-size="S">S</button>
                <button class="size-btn" data-size="M">M</button>
                <button class="size-btn active" data-size="L">L</button>

        </div>
      </div>
    </div>

    <div class="toast" id="toast">Спасибо! Мы уведомим вас 🔔</div>

        function renderGrid(list) {
            grid.innerHTML = '';

                            <div>
                                <div class="card-cat">${p.category}</div>
                                <h3 class="card-title">${p.title}</h3>
                            </div>
                            <span class="card-price">${p.price}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);

                setTimeout(() => {
                    card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100 + i * 80);
            });
        }

        /* ===== МОДАЛЬНОЕ ОКНО + ГАЛЕРЕЯ ===== */
        window.openModal = (id) => {
            const p = PRODUCTS.find(x => x.id === id);
            if (!p) return;
            
            // 🆕 Инициализация галереи
            currentProductImages = p.images || [p.img];
            currentImageIndex = 0;
            
            updateModalImage();
            
            document.getElementById('modal-title').textContent = p.title;
            document.getElementById('modal-price').textContent = p.price;
            document.getElementById('modal-cat').textContent = p.category;
            
            const descMap = {
                'верх': 'Плотный хлопок, усиленные швы, свободный крой. Не садится после стирки.',
                'низ': 'Эластичная ткань, удобная посадка, износостойкая фурнитура.',
                'аксессуары': 'Натуральные материалы, минималистичный дизайн, подходит к любому образу.'
            };
            document.getElementById('modal-desc').textContent = descMap[p.category] || descMap['верх'];
            
            // 🆕 Рендер миниатюр
            renderThumbnails();
            
            // 🆕 Управление видимостью элементов галереи
            const mediaEl = document.getElementById('modal-media');
            if (currentProductImages.length <= 1) {
                mediaEl.classList.add('single');
            } else {
                mediaEl.classList.remove('single');
            }
            
            // Сброс состояния
            isCTAClicked = false;
            selectedSize = 'L';
            const cta = document.getElementById('modal-cta');
            cta.textContent = '🔔 Уведомить о запуске';
            cta.classList.remove('disabled');
            document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.dataset.size === 'L'));
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        };

        // 🆕 Обновление изображения в модалке
        function updateModalImage() {
            const imgEl = document.getElementById('modal-img');
            const counterEl = document.getElementById('gallery-counter');
            
            // Плавный фейд
            imgEl.classList.add('fade');
            setTimeout(() => {
                imgEl.src = currentProductImages[currentImageIndex];
                imgEl.onload = () => { imgEl.classList.remove('fade'); };
                // Если изображение уже в кэше
                if (imgEl.complete) imgEl.classList.remove('fade');
            }, 120);
            
            // Счётчик
            if (currentProductImages.length > 1) {
                counterEl.textContent = `${currentImageIndex + 1} / ${currentProductImages.length}`;
            }
            
            updateActiveThumb();
        }

        // 🆕 Переключение изображений
        window.changeImage = (direction) => {
            if (currentProductImages.length <= 1) return;
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = currentProductImages.length - 1;
            if (currentImageIndex >= currentProductImages.length) currentImageIndex = 0;
            updateModalImage();
        };

        // 🆕 Рендер миниатюр
        function renderThumbnails() {
            const container = document.getElementById('gallery-thumbs');
            container.innerHTML = '';
            
            currentProductImages.forEach((src, index) => {
                const thumb = document.createElement('img');
                thumb.src = src;
                thumb.alt = `Фото ${index + 1}`;
                thumb.dataset.index = index;
                thumb.className = currentImageIndex === index ? 'active' : '';
                thumb.onclick = () => {
                    currentImageIndex = index;
                    updateModalImage();
                };
                container.appendChild(thumb);
            });
        }

        // 🆕 Обновление активной миниатюры
        function updateActiveThumb() {
            document.querySelectorAll('.gallery-thumbs img').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === currentImageIndex);
            });
        }

        // 🆕 Навигация клавиатурой
        document.addEventListener('keydown', e => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'Escape') closeModal();
            if (currentProductImages.length > 1) {
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
            }
        });

        // 🆕 Свайпы для мобильных
        let touchStartX = 0;
        const modalMedia = document.getElementById('modal-media');
        
        modalMedia?.addEventListener('touchstart', (e) => {
            if (currentProductImages.length <= 1) return;
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        
        modalMedia?.addEventListener('touchend', (e) => {
            if (currentProductImages.length <= 1) return;
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 40) {
                changeImage(diff > 0 ? 1 : -1);
            }
        }, { passive: true });

        // Выбор размера
        document.getElementById('size-grid')?.addEventListener('click', (e) => {
            if (e.target.classList.contains('size-btn')) {
                selectedSize = e.target.dataset.size;
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            }
        });

        // Обработка главной кнопки
        window.handleCTA = () => {
            if (isCTAClicked) return;
            isCTAClicked = true;
            const cta = document.getElementById('modal-cta');
            cta.textContent = `✓ Записано: размер ${selectedSize}`;
            cta.classList.add('disabled');
            showToast();
        };

        // Свайп вниз для закрытия на мобильных
        let touchStartY = 0;
        const modalEl = document.querySelector('.modal');
        modalEl?.addEventListener('touchstart', (e) => touchStartY = e.touches[0].clientY, { passive: true });
        modalEl?.addEventListener('touchmove', (e) => {
            const diff = e.touches[0].clientY - touchStartY;
            if (diff > 80) closeModal();
        }, { passive: true });

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        /* ===== ФИЛЬТРЫ ===== */
        filters.forEach(f => f.addEventListener('click', () => {
            filters.forEach(c => c.classList.remove('active'));
            f.classList.add('active');
            const filter = f.dataset.filter;
            let list = [...PRODUCTS];
            if (filter !== 'all') {
                list = list.filter(p => p.category.toLowerCase() === filter.toLowerCase());
            }
            renderGrid(list);
        }));

        /* ===== 3D TILT ===== */
        let tiltCard = null;
        grid.addEventListener('mousemove', e => {
            const card = e.target.closest('.card');
            if (!card) return;
            const inner = card.querySelector('.card-inner');
            const rect = card.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            inner.style.transform = `perspective(800px) rotateY(${x * 8}deg) rotateX(${-y * 8}deg)`;
            tiltCard = card;
        });
        grid.addEventListener('mouseleave', () => {
            if (tiltCard) {
                tiltCard.querySelector('.card-inner').style.transform = '';
                tiltCard = null;
            }
        });

        /* ===== HEADER SCROLL ===== */
        window.addEventListener('scroll', () => header.classList.toggle('scrolled', scrollY > 50), { passive: true });

        /* ===== SHARE ===== */
        window.sharePage = () => {
            const txt = `UNIO — мужская одежда скоро в продаже! ${location.href}`;
            if (navigator.share) {
                navigator.share({ title: 'UNIO', text: txt, url: location.href }).catch(() => {});
            } else {
                navigator.clipboard.writeText(txt);
                showToast();
            }
        };

        /* ===== ЗАПУСК ===== */
        (function init() {
            renderGrid(PRODUCTS);
            setTimeout(() => {
                intro.classList.add('up');
                setTimeout(() => {
                    document.getElementById('catalog').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 800);
            }, 2800);
        })();
    </script>
</body>
</html>
